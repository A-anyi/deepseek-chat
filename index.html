<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DeepSeek 助手</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>💬 对话列表</h3>
                <button class="new-chat-btn" id="newChatBtn">+ 新对话</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索对话..." class="search-input">
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <div class="overlay" id="overlay"></div>

        <!-- 主内容区 -->
        <div class="main-content">
            <header class="header">
                <button class="menu-btn" id="menuBtn">☰</button>
                <h1 id="chatTitle">✨ DeepSeek</h1>
                <div class="header-actions">
                    <button class="branch-btn" id="branchBtn" title="分支对话">🔀</button>
                    <button class="clear-btn" id="clearBtn" title="清空对话">🗑️</button>
                </div>
            </header>

            <div class="chat-container" id="chatContainer">
                <div class="welcome-message">
                    <div class="bot-avatar"><img src="deepseek.png" alt="助手"></div>
                    <div class="message-content">
                        你好！我是 DeepSeek 助手<br>
                        选择模型 | 管理对话 | 上传文件
                    </div>
                </div>
            </div>

            <!-- 模型选择器 -->
            <div class="model-selector" id="modelSelector">
                <div class="model-selector-header">🤖 模型选择</div>
                <div class="model-options" id="modelOptions"></div>
            </div>

            <!-- API 配置 -->
            <div class="api-config" id="apiConfig">
                <div class="config-header">
                    <span>⚙️ API 配置</span>
                    <button class="toggle-config collapsed" id="toggleConfig">▼</button>
                </div>
                <div class="config-body collapsed" id="configBody">
                    <input type="password" id="apiKeyInput" placeholder="输入 DeepSeek API Key" class="api-input">
                    <button class="save-btn" id="saveApiKey">保存</button>
                    <p class="api-hint"><a href="https://platform.deepseek.com/api_keys" target="_blank">🔑 获取 API Key →</a></p>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="input-container">
                <input type="file" id="fileInput" style="display:none" accept=".txt,.md,.json,.csv,.js,.py,.html,.css,.xml,.yaml,.yml,.log,.sh,.java,.c,.cpp,.php,.rb,.go,.rs,.ts,.tsx,.vue,.sql,.swift,.kt">
                <button class="attach-btn" id="attachBtn" title="上传文件">📎</button>
                <textarea id="messageInput" placeholder="输入消息..." rows="1" maxlength="10000"></textarea>
                <button class="send-btn" id="sendBtn"><span class="send-icon">➤</span></button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
